<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>濟時樓 AR 掃描 - 12織</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.3/dist/mindar-image-aframe.prod.js"></script>

  <style>
    :root {
      --safe-top: env(safe-area-inset-top);
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
      font-family: "Noto Sans TC", sans-serif;
    }

    .header {
      padding: calc(12px + var(--safe-top)) 16px 12px;
      background: linear-gradient(180deg, #f5f5f5, #fff);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 18px;
      font-weight: 700;
    }

    .btn-back {
      padding: 8px 14px;
      border-radius: 999px;
      border: none;
      background: #003366;
      color: #fff;
    }

    .main {
      position: relative;
      height: calc(100% - 70px);
    }

    #scene {
      width: 100%;
      height: 100%;
    }

    .scanner-frame {
      position: absolute;
      inset: 0;
      margin: auto;
      width: 70vw;
      aspect-ratio: 1/1;
      border-radius: 24px;
      border: 4px solid rgba(255,255,255,0.95);
      pointer-events: none;
    }

    .a-enter-vr-button,
    .a-enter-ar-button,
    .a-enter-vr,
    .a-enter-ar {
      display: none !important;
    }
  </style>
</head>

<body>
  <div class="header">
    <div>請對準：12織</div>
    <button class="btn-back" onclick="history.back()">返回</button>
  </div>

  <div class="main">
    <a-scene id="scene"
      mindar-image="imageTargetSrc: targets.mind;
                    filterMinCF:0.0001;
                    warmupTolerance:5;
                    missTolerance:5"
      embedded
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights; alpha: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: true">

      <!-- 強制後鏡頭 -->
      <a-camera look-controls="enabled: false"
                camera="active: true; fov: 70;">
      </a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-plane position="0 0 0"
                 width="0.75"
                 height="0.75"
                 material="src: url(./icon/png/12織.png); transparent: true">
        </a-plane>
      </a-entity>

    </a-scene>

    <div class="scanner-frame"></div>
  </div>
</body>
</html>
