<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"/>

<title>12織 AR 掃描</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.3/dist/mindar-image-aframe.prod.js"></script>

<style>
  html, body {
    margin:0;
    padding:0;
    height:100%;
    overflow:hidden;
    font-family:system-ui, sans-serif;
    background:#000;
  }

  /* 回到舊版：強制 MindAR video / canvas 撐滿畫面（讓鏡頭不會黑） */
  video, canvas, .a-canvas,
  .mindar-ui-overlay, .mindar-ui-scanning, .mindar-ui-loading {
    position:fixed !important;
    left:0 !important;
    top:0 !important;
    width:100vw !important;
    height:100vh !important;
    object-fit:cover !important;
    background:transparent !important;
    z-index:1;
  }

  /* 上方標題欄 */
  #header {
    position:fixed;
    left:0; top:0;
    width:100%;
    z-index:10;
    padding:16px;
    box-sizing:border-box;
    background:linear-gradient(180deg,#f5f5f5,#ffffff);
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  #header span { font-size:18px; font-weight:700; }
  #backBtn {
    padding:8px 16px;
    border-radius:12px;
    border:0;
    background:#003366;
    color:white;
    font-size:14px;
  }

  /* 掃描框（透明中間、白框） */
  #scanFrame {
    position:fixed;
    inset:0;
    z-index:9;
    display:flex;
    align-items:center;
    justify-content:center;
    pointer-events:none;
  }
  #scanFrame .box {
    width:min(75vw,420px);
    aspect-ratio:1/1;
    border:4px solid white;
    border-radius:22px;
  }

  /* 隱藏 VR 按鈕 */
  .a-enter-vr,
  .a-enter-ar,
  .a-enter-vr-button,
  .a-enter-ar-button {
    display:none !important;
  }
</style>
</head>

<body>

<div id="header">
  <span>請對準：12織</span>
  <button id="backBtn" onclick="history.back()">返回</button>
</div>

<div id="scanFrame">
  <div class="box"></div>
</div>

<a-scene id="scene"
  mindar-image="imageTargetSrc: ./targets.mind; maxTrack:1;"
  embedded
  color-space="sRGB"
  renderer="colorManagement:true; physicallyCorrectLights:true; alpha:true;"
  vr-mode-ui="enabled:false"
  device-orientation-permission-ui="enabled:true">

  <a-camera look-controls="enabled:false"></a-camera>

  <!-- 12織 targetIndex=0 -->
  <a-entity mindar-image-target="targetIndex: 0">
    <a-plane position="0 0 0"
             width="0.8" height="0.8"
