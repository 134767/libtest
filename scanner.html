<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>濟時樓 AR 掃描 - 12織</title>

  <!-- A-Frame + MindAR -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.3/dist/mindar-image-aframe.prod.js"></script>

  <style>
    :root {
      --safe-top: env(safe-area-inset-top);
      --safe-right: env(safe-area-inset-right);
      --safe-bottom: env(safe-area-inset-bottom);
      --safe-left: env(safe-area-inset-left);
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000; /* 背景改黑，避免白牆感 */
      font-family: system-ui, -apple-system, BlinkMacSystemFont,
                   "Noto Sans TC", sans-serif;
    }

    /* 整體版面：上方標題 + 下方 AR 區塊 */
    .page {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .header {
      padding: calc(12px + var(--safe-top)) 16px 8px;
      background: linear-gradient(180deg, #f5f5f5, #ffffff);
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-sizing: border-box;
    }

    .header-title {
      font-size: 18px;
      font-weight: 700;
    }

    .btn-back {
      padding: 8px 14px;
      border-radius: 999px;
      border: none;
      font-size: 14px;
      background: #003366;
      color: #fff;
      cursor: pointer;
      white-space: nowrap;
    }

    .main {
      position: relative;
      flex: 1;
      overflow: hidden;
    }

    /* AR 場景塞滿 main，高度就是 header 下面到螢幕底 */
    #scene {
      width: 100%;
      height: 100%;
    }

    /* ✅ 預設 QR 掃描框：只有框線，沒有白底 */
    .scanner-frame {
      position: absolute;
      inset: 0;
      margin: auto;
      width: 70vw;
      max-width: 420px;
      aspect-ratio: 1 / 1;
      border-radius: 24px;
      border: 4px solid rgba(255, 255, 255, 0.95);
      background: transparent;   /* 關鍵：不填色，完全透明 */
      box-sizing: border-box;
      pointer-events: none;      /* 不擋觸控 */
    }
  </style>
</head>
<body>
  <div class="page">
    <!-- 上方標題列（按鈕不會再被裁切） -->
    <div class="header">
      <div class="header-title">請對準：12織</div>
      <!-- 這裡依你的實際路徑調整，例如 ../index.html 或 pages/mission1.html -->
      <button class="btn-back" onclick="window.location.href='index.html';">
        返回
      </button>
    </div>

    <!-- AR 區域 -->
    <div class="main">
      <a-scene id="scene"
        mindar-image="imageTargetSrc: targets.mind"
        embedded
        color-space="sRGB"
        renderer="colorManagement: true, physicallyCorrectLights; alpha: true"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">

        <a-camera look-controls="enabled: false"></a-camera>

        <!-- 12織 對應的 targetIndex，依你 targets.mind 的順序修改 -->
        <a-entity mindar-image-target="targetIndex: 0">
          <!-- 這裡可以放你的 3D 或 PNG，如果暫時不要就用透明平面佔位 -->
          <a-plane position="0 0 0"
                   width="1" height="1"
                   material="opacity: 0">
          </a-plane>
        </a-entity>
      </a-scene>

      <!-- ✅ 預設 QR 掃描框（無 PNG、無白色畫布） -->
      <div class="scanner-frame"></div>
    </div>
  </div>
</body>
</html>
