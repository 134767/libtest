<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>濟時樓 AR 掃描 - 12織</title>

  <!-- 完全沿用官方 Smoke Test 使用的版本 -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.3/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, "Noto Sans TC", sans-serif;
    }

    /* 上方標題列 + 返回 */
    #topBar {
      position: fixed;
      left: 0;
      right: 0;
      top: 0;
      z-index: 20;
      padding: 10px 16px;
      background: linear-gradient(180deg,#f5f5f5,#ffffffee);
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-sizing: border-box;
    }
    #topBar-title {
      font-size: 18px;
      font-weight: 700;
    }
    #backBtn {
      border: none;
      padding: 8px 14px;
      border-radius: 999px;
      background: #003366;
      color: #fff;
      font-size: 14px;
    }

    /* 中央白色掃描框（透明底） */
    #scanFrame {
      position: fixed;
      inset: 0;
      margin: auto;
      width: min(70vw, 420px);
      aspect-ratio: 1/1;
      border-radius: 24px;
      border: 4px solid #ffffff;
      pointer-events: none;
      z-index: 10;
    }

    /* 中下方狀態文字（debug 用） */
    #status {
      position: fixed;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      z-index: 20;
      padding: 6px 10px;
      font-size: 12px;
      color: #fff;
      background: rgba(0,0,0,.5);
      border-radius: 999px;
    }

    /* 「開始掃描」按鈕：完全照官方 smoke test 寫法 */
    #startBtn {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%,-50%);
      z-index: 30;
      font-size: 18px;
      padding: 10px 22px;
      border-radius: 999px;
      border: none;
      background: #2563eb;
      color: #fff;
      box-shadow: 0 10px 25px rgba(15,23,42,.25);
    }

    /* 把 VR 按鈕藏起來 */
    .a-enter-vr,
    .a-enter-ar,
    .a-enter-vr-button,
    .a-enter-ar-button {
      display: none !important;
    }
  </style>
</head>
<body>
  <!-- 標題列 -->
  <div id="topBar">
    <div id="topBar-title">請對準：12織</div>
    <button id="backBtn" onclick="history.back()">返回</button>
  </div>

  <!-- 中央掃描框 -->
  <div id="scanFrame"></div>

  <!-- 狀態文字 -->
  <div id="status">請點選「開始掃描」啟動相機</div>

  <!-- 官方 Smoke Test 風格：按鈕啟動 AR -->
  <button id="startBtn">開始掃描</button>

  <!-- AR 場景：程式邏輯交給 MindAR 自己處理 -->
  <a-scene
    id="scene"
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: false"
    embedded
    vr-mode-ui="enabled: false">

    <a-camera look-controls="enabled: false"></a-camera>

    <!-- 假設 12織 是 targets.mind 的第 0 筆 -->
    <a-entity id="t12" mindar-image-target="targetIndex: 0">
      <!-- 之後你要顯示 12織 PNG，再把下面註解打開即可 -->
      <!--
      <a-plane position="0 0 0"
               width="0.75"
               height="0.75"
               material="src: url(./icon/png/12織.png); transparent: true; side: double">
      </a-plane>
      -->
    </a-entity>
  </a-scene>

  <script>
    const sceneEl = document.querySelector('#scene');
    const startBtn = document.querySelector('#startBtn');
    const statusEl = document.querySelector('#status');
    const t12 = document.querySelector('#t12');

    // 按下「開始掃描」才啟動（完全仿官方 smoke test）
    startBtn.addEventListener('click', async () => {
      startBtn.style.display = 'none';
      statusEl.textContent = '正在啟動相機與 AR…';

      const mindarSystem = sceneEl.systems['mindar-image-system'];
      if (!mindarSystem || !mindarSystem.start) {
        statusEl.textContent = 'MindAR 尚未準備完成，請重新整理頁面。';
        return;
      }

      try {
        await mindarSystem.start();
        statusEl.textContent = '請對準 12織 圖樣';
      } catch (e) {
        console.error(e);
        statusEl.textContent = '相機啟動失敗，請檢查瀏覽器權限。';
      }
    });

    // 追蹤事件（純 debug）
    t12.addEventListener('targetFound', () => {
      statusEl.textContent = '已辨識到 12織！';
    });
    t12.addEventListener('targetLost', () => {
      statusEl.textContent = '目標遺失，請重新對準 12織。';
    });
  </script>
</body>
</html>
