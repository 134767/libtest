<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>濟時樓 AR 掃描 - 12織</title>

  <!-- A-Frame + MindAR -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.3/dist/mindar-image-aframe.prod.js"></script>

  <style>
    :root {
      --safe-top: env(safe-area-inset-top);
      --safe-right: env(safe-area-inset-right);
      --safe-bottom: env(safe-area-inset-bottom);
      --safe-left: env(safe-area-inset-left);
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont,
                   "Noto Sans TC", sans-serif;
    }

    .page {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .header {
      padding: calc(12px + var(--safe-top)) 16px 8px;
      background: linear-gradient(180deg, #f5f5f5, #ffffff);
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-sizing: border-box;
    }

    .header-title {
      font-size: 18px;
      font-weight: 700;
    }

    .btn-back {
      padding: 8px 14px;
      border-radius: 999px;
      border: none;
      font-size: 14px;
      background: #003366;
      color: #fff;
      cursor: pointer;
      white-space: nowrap;
    }

    .main {
      position: relative;
      flex: 1;
      overflow: hidden;
    }

    /* AR 場景：填滿 header 底下的全部空間 */
    #scene {
      width: 100%;
      height: 100%;
    }

    /* ✅ 預設掃描框：只有白框、背景透明 */
    .scanner-frame {
      position: absolute;
      inset: 0;
      margin: auto;
      width: 70vw;
      max-width: 420px;
      aspect-ratio: 1 / 1;
      border-radius: 24px;
      border: 4px solid rgba(255, 255, 255, 0.95);
      background: transparent;
      box-sizing: border-box;
      pointer-events: none;
    }

    /* 🔇 關閉 A-Frame 預設 VR/AR 按鈕 */
    .a-enter-vr,
    .a-enter-ar,
    .a-enter-vr-button,
    .a-enter-ar-button {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="page">
    <!-- 上方標題列 -->
    <div class="header">
      <div class="header-title">請對準：12織</div>
      <!-- 返回：如果你要回首頁或任務一，可以改成指定網址 -->
      <button class="btn-back" onclick="history.back();">
        返回
      </button>
    </div>

    <!-- 下方 AR 區域 -->
    <div class="main">
      <a-scene id="scene"
        mindar-image="imageTargetSrc: targets.mind"
        embedded
        color-space="sRGB"
        renderer="colorManagement: true, physicallyCorrectLights; alpha: true"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">

        <a-camera look-controls="enabled: false"></a-camera>

        <!-- 12織 對應的 targetIndex（假設是第 0 個） -->
        <a-entity mindar-image-target="targetIndex: 0">
          <!-- ✅ 12織 PNG：放在掃描框中間 -->
          <a-plane position="0 0 0"
                   width="0.75"
                   height="0.75"
                   material="src: url(./icon/png/12織.png); transparent: true">
          </a-plane>
        </a-entity>
      </a-scene>

      <!-- 掃描框（純白框、透明底） -->
      <div class="scanner-frame"></div>
    </div>
  </div>
</body>
</html>
