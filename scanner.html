<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>學院之心 AR 掃描器</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <!-- A-Frame + MindAR -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.3/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, "Noto Sans TC", sans-serif;
    }

    /* 讓相機畫面鋪滿，避免被白底蓋掉 */
    a-scene {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: transparent !important;
    }
    video, canvas, .a-canvas {
      position: fixed !important;
      left: 0 !important;
      top: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      object-fit: cover !important;
      background: transparent !important;
    }

    /* 上方標題列 + 返回 */
    .scan-topbar {
      position: fixed;
      left: 0;
      right: 0;
      top: 0;
      z-index: 20;
      padding: 10px 16px;
      background: linear-gradient(180deg,#f5f5f5,#ffffffee);
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-sizing: border-box;
    }
    .scan-title {
      font-size: 18px;
      font-weight: 700;
      color: #111827;
    }
    .scan-back {
      border: none;
      padding: 8px 14px;
      border-radius: 999px;
      background: #003366;
      color: #fff;
      font-size: 14px;
    }

    /* 中央白框（預設 QR 掃描框） */
    .scan-frame-wrap {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      pointer-events: none;
    }
    .scan-frame {
      width: min(70vw, 420px);
      aspect-ratio: 1 / 1;
      border-radius: 24px;
      border: 4px solid #ffffff;
      position: relative;
      box-sizing: border-box;
    }
    .scan-corner {
      position: absolute;
      width: 26px;
      height: 26px;
      border: 4px solid #ffffff;
    }
    .scan-corner.tl { left: -2px; top: -2px; border-right: none; border-bottom: none; }
    .scan-corner.tr { right: -2px; top: -2px; border-left: none; border-bottom: none; }
    .scan-corner.bl { left: -2px; bottom: -2px; border-right: none; border-top: none; }
    .scan-corner.br { right: -2px; bottom: -2px; border-left: none; border-top: none; }

    /* 中下方狀態列 */
    .scan-status {
      position: fixed;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      z-index: 20;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      color: #fff;
      background: rgba(0,0,0,.55);
      max-width: 90vw;
      text-align: center;
    }

    /* 中央「開始掃描」按鈕（為了確保在使用者手勢下啟動相機） */
    .scan-start {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 30;
      padding: 12px 24px;
      border-radius: 999px;
      border: none;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(180deg,#3b82f6,#2563eb);
      box-shadow: 0 12px 30px rgba(15,23,42,.35);
      cursor: pointer;
    }

    /* 隱藏 VR 按鈕 */
    .a-enter-vr, .a-enter-ar,
    .a-enter-vr-button, .a-enter-ar-button {
      display: none !important;
    }
  </style>
</head>
<body>
  <header class="scan-topbar">
    <div class="scan-title" id="scan-title">請對準：學院之心</div>
    <button class="scan-back" id="back-btn">返回任務一</button>
  </header>

  <!-- 中央掃描框 (白色) -->
  <div class="scan-frame-wrap">
    <div class="scan-frame">
      <div class="scan-corner tl"></div>
      <div class="scan-corner tr"></div>
      <div class="scan-corner bl"></div>
      <div class="scan-corner br"></div>
    </div>
  </div>

  <!-- 狀態提示 -->
  <div class="scan-status" id="scan-status">請點「開始掃描」啟動相機</div>

  <!-- 開始掃描按鈕 -->
  <button class="scan-start" id="scan-start">開始掃描</button>

  <!-- AR 場景：只負責影像追蹤，邏輯在下面 JS -->
  <a-scene
    id="scene"
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: false"
    embedded
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-camera look-controls="enabled:false"></a-camera>

    <!-- 0~11 anchor，都先建好 -->
    <a-entity id="anchor-0"  mindar-image-target="targetIndex: 0"></a-entity>
    <a-entity id="anchor-1"  mindar-image-target="targetIndex: 1"></a-entity>
    <a-entity id="anchor-2"  mindar-image-target="targetIndex: 2"></a-entity>
    <a-entity id="anchor-3"  mindar-image-target="targetIndex: 3"></a-entity>
    <a-entity id="anchor-4"  mindar-image-target="targetIndex: 4"></a-entity>
    <a-entity id="anchor-5"  mindar-image-target="targetIndex: 5"></a-entity>
    <a-entity id="anchor-6"  mindar-image-target="targetIndex: 6"></a-entity>
    <a-entity id="anchor-7"  mindar-image-target="targetIndex: 7"></a-entity>
    <a-entity id="anchor-8"  mindar-image-target="targetIndex: 8"></a-entity>
    <a-entity id="anchor-9"  mindar-image-target="targetIndex: 9"></a-entity>
    <a-entity id="anchor-10" mindar-image-target="targetIndex:10"></a-entity>
    <a-entity id="anchor-11" mindar-image-target="targetIndex:11"></a-entity>

  </a-scene>

  <script>
    // force 對應表（如果之後要用 force=03傳 這類參數）
    const IDX_BY_CODE = {
      "03傳": 2,
      "06理": 5,
      "09法": 8,
      "10社": 9,
      "11管": 10,
      "12織": 11
    };

    const params = new URLSearchParams(location.search);
    let target = params.get("target") || "";
    let idxStr = params.get("idx") || "";
    const step = params.get("step") || "";
    const force = params.get("force");

    if (force) {
      target = force;
      if (!idxStr && IDX_BY_CODE[force] !== undefined) {
        idxStr = String(IDX_BY_CODE[force]);
      }
    }

    const idx = Number(idxStr);
    const titleEl  = document.getElementById("scan-title");
    const statusEl = document.getElementById("scan-status");
    const startBtn = document.getElementById("scan-start");
    const sceneEl  = document.getElementById("scene");
    const backBtn  = document.getElementById("back-btn");

    // 標題文字
    if (target) {
      titleEl.textContent = `請對準：${target}`;
    } else {
      titleEl.textContent = "請對準：學院之心";
    }

    // 返回任務一（依照目前 repo 根目錄推 mission1.html）
    function getRepoBase() {
      const segs = location.pathname.split("/").filter(Boolean);
      return segs.length ? `/${segs[0]}/` : "/";
    }
    backBtn.addEventListener("click", (e) => {
      e.preventDefault();
      location.href = getRepoBase() + "pages/mission1.html";
    });

    // 綁定指定 anchor 的事件
    let activeAnchor = null;
    if (!Number.isNaN(idx)) {
      activeAnchor = document.getElementById(`anchor-${idx}`);
    }

    if (activeAnchor) {
      activeAnchor.addEventListener("targetFound", () => {
        statusEl.textContent = `已辨識到 ${target || "目標"}！`;

        // ✅ 自動回任務一，帶上通關資訊
        const base = getRepoBase() + "pages/mission1.html";
        const url = new URL(base, location.origin);
        url.searchParams.set("passed", String(idx));
        if (target) url.searchParams.set("target", target);
        if (step)   url.searchParams.set("step", step);
        location.replace(url.toString());
      });

      activeAnchor.addEventListener("targetLost", () => {
        statusEl.textContent = `目標遺失，請重新對準 ${target || "目標"}。`;
      });
    } else {
      statusEl.textContent = "未指定有效目標 idx，請從任務頁重新進入。";
    }

    // 按下「開始掃描」：在使用者手勢下啟動 MindAR 相機
    startBtn.addEventListener("click", async () => {
      startBtn.style.display = "none";
      statusEl.textContent = "正在啟動相機與 AR…";

      const sys = sceneEl.systems["mindar-image-system"];
      if (!sys || typeof sys.start !== "function") {
        statusEl.textContent = "MindAR 尚未準備完成，請重新整理頁面。";
        return;
      }

      try {
        await sys.start();
        statusEl.textContent = target
          ? `請對準「${target}」的學院之心圖樣`
          : "請對準指定圖樣";
      } catch (e) {
        console.error(e);
        statusEl.textContent = "相機啟動失敗，請確認瀏覽器已允許使用相機。";
        startBtn.style.display = "block";
      }
    });
  </script>
</body>
</html>
