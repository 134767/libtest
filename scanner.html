<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"/>

<title>12織 AR 掃描</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.3/dist/mindar-image-aframe.prod.js"></script>

<style>
  html, body {
    margin:0;
    padding:0;
    height:100%;
    overflow:hidden;
    font-family:system-ui, sans-serif;
    background:#000;
  }

  /* 🔑 關鍵：強制 MindAR 的 video / canvas 撐滿螢幕，照舊版 index.html 寫法 */
  video, canvas, .a-canvas,
  .mindar-ui-overlay, .mindar-ui-scanning, .mindar-ui-loading {
    position:fixed !important;
    left:0 !important;
    top:0 !important;
    width:100vw !important;
    height:100vh !important;
    object-fit:cover !important;
    background:transparent !important;
    z-index:1;
  }

  /* 上方標題列 */
  #header {
    position:fixed;
    left:0; top:0;
    width:100%;
    z-index:10;
    padding:16px;
    box-sizing:border-box;
    background:linear-gradient(180deg,#f5f5f5,#ffffff);
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  #header span {
    font-size:18px;
    font-weight:700;
  }
  #backBtn {
    padding:8px 16px;
    border-radius:12px;
    border:0;
    background:#003366;
    color:white;
    font-size:14px;
  }

  /* 中間白色掃描框（透明中間） */
  #scanFrame {
    position:fixed;
    inset:0;
    z-index:9;
    display:flex;
    align-items:center;
    justify-content:center;
    pointer-events:none;
  }
  #scanFrame .box {
    width:min(75vw,420px);
    aspect-ratio:1/1;
    border:4px solid #ffffff;
    border-radius:22px;
  }

  /* 「開始掃描」按鈕：給瀏覽器一個使用者手勢來啟動相機 */
  #startBtn {
    position:fixed;
    left:50%; top:50%;
    transform:translate(-50%, -50%);
    z-index:11;
    padding:12px 24px;
    border-radius:999px;
    border:0;
    font-size:16px;
    font-weight:700;
    background:rgba(0,0,0,0.75);
    color:#ffffff;
  }

  /* 隱藏 VR / AR 預設按鈕 */
  .a-enter-vr,
  .a-enter-ar,
  .a-enter-vr-button,
  .a-enter-ar-button {
    display:none !important;
  }
</style>
</head>

<body>

<div id="header">
  <span>請對準：12織</span>
  <button id="backBtn" onclick="history.back()">返回</button>
</div>

<div id="scanFrame">
  <div class="box"></div>
</div>

<button id="startBtn">開始掃描</button>

<a-scene id="scene"
  mindar-image="imageTargetSrc: ./targets.mind; maxTrack:1;
                 filterMinCF:0.0001; filterBeta:0.05;
                 missTolerance:10; warmupTolerance:5;
                 uiScanning:no; uiLoading:no; uiError:no"
  embedded
  color-space="sRGB"
  renderer="colorManagement:true; physicallyCorrectLights:true; antialias:true; alpha:true;"
  vr-mode-ui="enabled:false"
  device-orientation-permission-ui="enabled:false">

  <a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

  <!-- 12織：假設對應 targets.mind 的 targetIndex = 0 -->
  <a-entity mindar-image-target="targetIndex: 0">
    <a-plane position="0 0 0"
             width="0.8" height="0.8"
             material="src: url(./icon/png/12織.png); transparent:true; side:double;">
    </a-plane>
  </a-entity>

  <a-entity light="type:ambient; intensity:0.9"></a-entity>
  <a-entity light="type:directional; intensity:0.8" position="0 1 0"></a-entity>
</a-scene>

<script>
  const sceneEl = document.getElementById('scene');
  const startBtn = document.getElementById('startBtn');

  // 跟舊版 index.html 一樣：點按鈕後才啟動 MindAR
  startBtn.addEventListener('click', () => {
    startBtn.style.display = 'none';
    const sys = sceneEl.systems['mindar-image-system'];
    if (sys && typeof sys.start === 'function') {
      sys.start();
    } else {
      alert('MindAR 尚未就緒，請稍後重新整理再試一次。');
    }
  });
</script>

</body>
</html>
